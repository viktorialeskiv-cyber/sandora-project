<!doctype html>
<html lang="ua">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Оформлення замовлення</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/form-validation.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/form-validation.css">

    <style>
        .container { max-width: 960px; }
        /* Колір для іконки та заголовка */
        .brand-text { color: #1A3C5E; }
    </style>
</head>
<body class="bg-light">

  <div class="container mt-3">
    <a href="shop.html" class="btn btn-outline-secondary btn-sm">
        <i class="fa-solid fa-arrow-left"></i> Повернутися до магазину
    </a>
</div>
    
<div class="container">
  <main>
    <div class="py-5 text-center brand-text">
      <i class="fa-regular fa-face-smile fa-3x mb-3"></i> <h2>Форма замовлення</h2>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-8">
        <h4 class="mb-3">Контактні дані</h4>
        <form class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-sm-6">
              <label for="firstName" class="form-label">Ім'я</label>
              <input type="text" class="form-control" id="firstName" required>
              <div class="invalid-feedback">Будь ласка, введіть коректне ім'я</div>
            </div>

            <div class="col-sm-6">
              <label for="lastName" class="form-label">Прізвище</label>
              <input type="text" class="form-control" id="lastName" required>
              <div class="invalid-feedback">Будь ласка, введіть коректне прізвище</div>
            </div>

            <div class="col-12">
              <label for="email" class="form-label">Електронна пошта</label>
              <input type="email" class="form-control" id="email" placeholder="you@gmail.com">
              <div class="invalid-feedback">Будь ласка, введіть коректну пошту</div>
            </div>

            <div class="col-12">
              <label for="address" class="form-label">Адреса</label>
              <input type="text" class="form-control" id="address" placeholder="вул. Висока, 49" required>
              <div class="invalid-feedback">Будь ласка, введіть адресу</div>
            </div>

            <div class="col-md-5">
              <label for="country" class="form-label">Країна</label>
              <select class="form-select" id="country" required>
                <option value="">Оберіть...</option>
                <option>Україна</option>
                <option>Польща</option>
              </select>
            </div>

            <div class="col-md-7"> <label for="state" class="form-label">Місто</label>
              <select class="form-select" id="state" required>
                <option value="">Оберіть...</option>
                <option>Львів</option>
                <option>Луцьк</option>
                <option>Одеса</option>
                <option>Київ</option>
              </select>
            </div>
          </div>

          <hr class="my-4">

          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="same-address">
            <label class="form-check-label" for="same-address">Поштова адреса така ж, як і моя</label>
          </div>

          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="save-info">
            <label class="form-check-label" for="save-info">Зберегти інформацію для наступного разу</label>
          </div>

          <hr class="my-4">

          <h4 class="mb-3">Оплата</h4>
          <div class="my-3">
            <div class="form-check">
              <input id="credit" name="paymentMethod" type="radio" class="form-check-input" checked required>
              <label class="form-check-label" for="credit">Готівкою або картою при отриманні</label>
            </div>
            <div class="form-check">
              <input id="debit" name="paymentMethod" type="radio" class="form-check-input" required>
              <label class="form-check-label" for="debit">Оплата онлайн карткою</label>
            </div>
          </div>

          <div class="row gy-3">
            <div class="col-md-6">
              <label for="cc-number" class="form-label">Номер картки</label>
              <input type="text" class="form-control" id="cc-number" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="col-md-3">
              <label for="cc-expiration" class="form-label">Термін</label>
              <input type="text" class="form-control" id="cc-expiration" placeholder="ММ/РР" required>
            </div>
            <div class="col-md-3">
              <label for="cc-cvv" class="form-label">CVV</label>
              <input type="text" class="form-control" id="cc-cvv" placeholder="123" required>
            </div>
          </div>

          <hr class="my-4">

          <button class="w-100 btn btn-primary btn-lg mb-5" type="submit">Підтвердити замовлення</button>
        </form>
      </div>
    </div>
  </main>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
